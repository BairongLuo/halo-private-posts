name: Full Regression

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run full acceptance flow
        env:
          HALO_BASE_URL: http://localhost:8090
          HALO_E2E_USERNAME: admin
          HALO_E2E_PASSWORD: Admin12345!
        run: ./scripts/dev-container-acceptance.sh

      - name: Collect Halo dev container logs
        if: failure()
        run: docker logs halo-for-plugin-development > halo-dev-container.log 2>&1 || true

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: full-regression-artifacts
          if-no-files-found: ignore
          path: |
            halo-dev-container.log
            build/reports/problems/
            ui/test-results/
            ui/playwright-report/
